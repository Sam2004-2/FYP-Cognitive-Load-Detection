name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [thesis/prune]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: thesis/prune
      STUDY_DOMAIN: ${{ secrets.STUDY_DOMAIN }}
      CLE_ADMIN_TOKEN: ${{ secrets.CLE_ADMIN_TOKEN }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DEPLOY_BRANCH,STUDY_DOMAIN,CLE_ADMIN_TOKEN
          script: |
            cd /opt/cle-app

            if [ ! -f .env.production ]; then
              touch .env.production
            fi

            if [ -n "$STUDY_DOMAIN" ]; then
              grep -q '^STUDY_DOMAIN=' .env.production || echo "STUDY_DOMAIN=$STUDY_DOMAIN" >> .env.production
              grep -q '^CLE_ALLOWED_ORIGINS=' .env.production || echo "CLE_ALLOWED_ORIGINS=https://$STUDY_DOMAIN" >> .env.production
              grep -q '^STUDY_PUBLIC_URL=' .env.production || echo "STUDY_PUBLIC_URL=https://$STUDY_DOMAIN" >> .env.production
            fi

            if [ -n "$CLE_ADMIN_TOKEN" ]; then
              grep -q '^CLE_ADMIN_TOKEN=' .env.production || echo "CLE_ADMIN_TOKEN=$CLE_ADMIN_TOKEN" >> .env.production
            fi

            DEPLOY_BRANCH="$DEPLOY_BRANCH" bash scripts/deploy.sh
